<script>
  const canvas = document.getElementById("moleculeCanvas");
  const ctx = canvas.getContext("2d");

  let width, height;
  let molecules = [];

  function resizeCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    createMolecules();
  }

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function createHexagon(cx, cy, r, rotation = 0) {
    const pts = [];
    for (let i = 0; i < 6; i++) {
      const a = rotation + (Math.PI * 2 * i) / 6;
      pts.push({
        x: cx + Math.cos(a) * r,
        y: cy + Math.sin(a) * r
      });
    }
    return pts;
  }

  function createMolecule() {
    const x = rand(0, width);
    const y = rand(0, height);
    const scale = rand(18, 34);
    const rotation = rand(0, Math.PI * 2);

    const type = Math.floor(rand(0, 3)); 
    // 0: single ring
    // 1: double ring
    // 2: ring with side chain

    return {
      x,
      y,
      scale,
      rotation,
      driftX: rand(-0.12, 0.12),
      driftY: rand(-0.08, 0.08),
      spin: rand(-0.002, 0.002),
      type
    };
  }

  function createMolecules() {
    molecules = [];
    const count = Math.max(10, Math.floor((width * height) / 120000));
    for (let i = 0; i < count; i++) {
      molecules.push(createMolecule());
    }
  }

  function drawBond(p1, p2, opacity = 0.22) {
    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.strokeStyle = `rgba(209, 77, 147, ${opacity})`;
    ctx.lineWidth = 1.4;
    ctx.stroke();
  }

  function drawAtom(p, r = 2.2, opacity = 0.32) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(209, 77, 147, ${opacity})`;
    ctx.fill();
  }

  function drawRing(points) {
    for (let i = 0; i < points.length; i++) {
      drawBond(points[i], points[(i + 1) % points.length], 0.22);
    }
    for (const p of points) {
      drawAtom(p, 2.2, 0.30);
    }
  }

  function shiftPoints(points, dx, dy) {
    return points.map(p => ({ x: p.x + dx, y: p.y + dy }));
  }

  function rotatePoint(px, py, cx, cy, angle) {
    const dx = px - cx;
    const dy = py - cy;
    return {
      x: cx + dx * Math.cos(angle) - dy * Math.sin(angle),
      y: cy + dx * Math.sin(angle) + dy * Math.cos(angle)
    };
  }

  function rotatePoints(points, cx, cy, angle) {
    return points.map(p => rotatePoint(p.x, p.y, cx, cy, angle));
  }

  function drawMolecule(m) {
    const cx = m.x;
    const cy = m.y;
    const r = m.scale;

    let ring1 = createHexagon(cx, cy, r, 0);
    ring1 = rotatePoints(ring1, cx, cy, m.rotation);
    drawRing(ring1);

    if (m.type === 1) {
      // double fused-like ring
      const ring2CenterX = cx + r * 1.55;
      const ring2CenterY = cy;
      let ring2 = createHexagon(ring2CenterX, ring2CenterY, r, 0);
      ring2 = rotatePoints(ring2, cx, cy, m.rotation);
      drawRing(ring2);

      drawBond(ring1[0], ring2[3], 0.18);
      drawBond(ring1[5], ring2[2], 0.18);
    }

    if (m.type === 2) {
      // side chain
      const attach = ring1[1];
      const p2 = {
        x: attach.x + Math.cos(m.rotation + Math.PI / 5) * r * 1.2,
        y: attach.y + Math.sin(m.rotation + Math.PI / 5) * r * 1.2
      };
      const p3 = {
        x: p2.x + Math.cos(m.rotation - Math.PI / 8) * r * 1.0,
        y: p2.y + Math.sin(m.rotation - Math.PI / 8) * r * 1.0
      };
      const p4 = {
        x: p3.x + Math.cos(m.rotation + Math.PI / 4) * r * 0.9,
        y: p3.y + Math.sin(m.rotation + Math.PI / 4) * r * 0.9
      };

      drawBond(attach, p2, 0.22);
      drawBond(p2, p3, 0.20);
      drawBond(p3, p4, 0.18);

      drawAtom(p2, 2.0, 0.28);
      drawAtom(p3, 2.0, 0.28);
      drawAtom(p4, 2.0, 0.28);
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);

    for (const m of molecules) {
      m.x += m.driftX;
      m.y += m.driftY;
      m.rotation += m.spin;

      if (m.x < -120) m.x = width + 120;
      if (m.x > width + 120) m.x = -120;
      if (m.y < -120) m.y = height + 120;
      if (m.y > height + 120) m.y = -120;

      drawMolecule(m);
    }

    requestAnimationFrame(animate);
  }

  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();
  animate();
</script>
